<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to get your .ics file</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fb; }
        .help-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 24px; background: #fff;
            border-bottom: 1px solid #e2e5ea;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: #eff4ff; color: #2563eb;
            border: 1px solid #bfdbfe; border-radius: 6px;
            font-size: 13px; font-weight: 500; text-decoration: none;
            transition: background 0.15s;
        }
        .back-btn:hover { background: #dbeafe; }
        .help-header h1 { font-size: 16px; font-weight: 600; color: #1a1d23; }
        .pdf-container { width: 100%; height: calc(100vh - 57px); }
        .pdf-container iframe {
            width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>
    <div class="help-header">
        <a href="/" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="2" stroke="currentColor" width="14" height="14">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
            </svg>
            Back
        </a>
        <h1>How to get your .ics file from RWU</h1>
    </div>
    <div class="pdf-container">
        <iframe src="/static/help-guide.pdf"></iframe>
    </div>
</body>
</html>
